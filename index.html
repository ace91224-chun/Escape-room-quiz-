<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密室逃脫角色測驗</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 580px;
    padding: 2.5rem 2rem;
  }

  /* ── Intro ── */
  .intro { text-align: center; }
  .intro-icon { font-size: 48px; margin-bottom: 1rem; }
  .intro h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 0.6rem; }
  .intro p { font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 1.75rem; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 2rem; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }

  /* ── Quiz ── */
  .progress-bar { height: 5px; background: #ece9f8; border-radius: 3px; margin-bottom: 1.75rem; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7F77DD, #AFA9EC); border-radius: 3px; transition: width 0.4s ease; }
  .q-meta { font-size: 12px; color: #aaa; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .q-text { font-size: 17px; font-weight: 600; color: #1a1a2e; line-height: 1.65; margin-bottom: 1.5rem; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: #fafafa;
    border: 1.5px solid #e8e8e8;
    border-radius: 12px;
    padding: 13px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 14.5px;
    color: #333;
    line-height: 1.55;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    width: 100%;
  }
  .opt-btn:hover { background: #f0eefb; border-color: #7F77DD; }
  .opt-btn:active { transform: scale(0.99); }
  .opt-btn.selected { border-color: #7F77DD; background: #eeedfe; color: #3C3489; font-weight: 500; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btn {
    padding: 10px 22px;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    background: transparent;
    font-size: 14px;
    cursor: pointer;
    color: #555;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn:hover { background: #f5f5f5; }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary {
    background: #7F77DD;
    border-color: #7F77DD;
    color: #fff;
  }
  .btn.primary:hover { background: #6960c8; }
  .btn.primary:disabled { background: #c5c2ee; border-color: #c5c2ee; }

  /* ── Result ── */
  .role-badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }
  .role-title { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 0.6rem; }
  .role-desc { font-size: 14.5px; color: #555; line-height: 1.75; margin-bottom: 1.75rem; }

  .section-title { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }

  .bar-group { margin-bottom: 1.5rem; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-name { font-size: 13px; color: #666; width: 58px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s ease; }
  .bar-pct { font-size: 12px; color: #aaa; width: 30px; text-align: right; }

  .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .trait-card { background: #f8f7fd; border-radius: 12px; padding: 12px 14px; }
  .trait-label { font-size: 11px; color: #aaa; margin-bottom: 4px; letter-spacing: 0.04em; }
  .trait-val { font-size: 13.5px; color: #333; font-weight: 600; }

  .secondary-card {
    border: 1.5px dashed #d5d2f0;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 1.5rem;
    background: #faf9ff;
  }
  .secondary-emoji { font-size: 26px; flex-shrink: 0; }
  .secondary-name { font-size: 14px; font-weight: 600; color: #3C3489; margin-bottom: 4px; }
  .secondary-desc { font-size: 13px; color: #666; line-height: 1.6; }

  .tips-box { background: #f5f4f0; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .tips-box .section-title { margin-bottom: 10px; }
  .tip-item { font-size: 13.5px; color: #444; padding: 7px 0; border-bottom: 1px solid #e8e6e0; line-height: 1.55; }
  .tip-item:last-child { border-bottom: none; }

  .restart-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid #7F77DD;
    background: transparent;
    color: #534AB7;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #eeedfe; }

  @media (max-width: 480px) {
    body { padding: 1rem 0.5rem; }
    .card { padding: 1.75rem 1.25rem; border-radius: 16px; }
    .trait-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card" id="app"></div>

<script>
const questions = [
  {
    q: "進入密室後，你第一件事會做什麼？",
    opts: [
      { text: "快速掃視整個空間，確認出口與道具分佈", role: "leader" },
      { text: "立刻四處翻找，看有沒有藏起來的東西", role: "scout" },
      { text: "走向最陰暗的角落，看看裡面有什麼", role: "tank" },
      { text: "仔細盯著牆上的說明文字與圖案，思考規律", role: "brain" }

      { text: "馬上開始拼湊，試著找出規律", role: "brain" },
      { text: "叫最擅長的人來，自己繼續搜查其他地方", role: "scout" },
      { text: "問一下大家有沒有發現其他地方的相關線索", role: "leader" },

      { text: "把七零八碎的線索串聯在一起時的豁然開朗", role: "brain" },
      { text: "在最緊張的時刻讓大家保持冷靜、整頓方向", role: "leader" },
      { text: "第一個踏入黑暗空間時腎上腺素飆升的感覺", role: "tank" }
    ]
  },
  {

      { text: "再按一次，觀察規律", role: "brain" },

      { text: "記錄下來，繼續去其他地方找線索", role: "scout" },
      { text: "通知全隊，詢問有沒有人在其他地方看到相關提示", role: "leader" }

  },
  {
    q: "恐怖主題密室裡，NPC（演員）突然靠近你們，你會？",
    opts: [
      { text: "冷靜說「沒關係，繼續推進」，穩住全隊", role: "leader" },
      { text: "往前一步吸引它注意，讓隊友有空間行動", role: "tank" },
      { text: "趁亂觀察NPC出現的地方有沒有道具可以拿", role: "scout" },
      { text: "腦子一片空白，總之先逃再說吧", role: "diplomat" }
    ]

  {
    q: "你最常被朋友稱讚的特質是？",
    opts: [
      { text: "有膽量、不怕事", role: "tank" },
      { text: "觀察細膩、找東西超厲害", role: "scout" },
      { text: "很會協調分工，讓事情順利推進", role: "leader" },

    q: "全隊卡在同一個謎題超過10分鐘，毫無進展，你覺得？",

      { text: "這很正常，繼續找，靈感總會來的", role: "brain" },
      { text: "先去把沒搜完的地方掃一遍，說不定有新線索", role: "scout" },
      { text: "評估一下還剩多少時間，決定是否調整策略", role: "leader" },

  },
{
  q: "當密室中的燈光突然變暗，背景音效開始變得詭異時，你的反應會是？",

    { text: "趁機重新掃視四周，說不定有新的線索出現", role: "scout" },

{

    { text: "分析這句話的邏輯結構，思考是否存在自我矛盾", role: "brain" },
    { text: "先請大家整理目前相關線索，再決定怎麼操作", role: "leader" },
    { text: "重新搜索附近，看有沒有更多提示能驗證這句話", role: "scout" },
    { text: "先按一個試試看，觀察機關反應再說", role: "tank" }

},
{
  q: "你們發出求救，小天使只說了一句：「有個地方你們還沒仔細看過。」你會？",
  opts: [
    { text: "重新搜索每個角落，不放過任何細節", role: "scout" },
    { text: "檢視已取得線索，看看是否忽略了某個關鍵訊息", role: "brain" },
    { text: "先確認哪些區域已經搜過，再安排大家重新分工", role: "leader" },
    { text: "直接去最可疑、但大家一直不敢碰的地方看看", role: "tank" }

},
{
  q: "全隊手上共有7條線索，但彼此意見完全不同。這時你會做什麼？",
  opts: [
    { text: "讓大家把發現的資訊攤開來，一起重新整理", role: "leader" },
    { text: "專心研究線索背後的邏輯，找出真正的關鍵", role: "brain" },
    { text: "回頭檢查現場，看看是不是還有被忽略的細節", role: "scout" },
    { text: "與其一直討論，不如先驗證其中一個方向", role: "tank" }
  ]
},
{
  q: "時間剩下不多，有隊友突然情緒崩潰說：「我們絕對出不去了！」你會怎麼辦？",
  opts: [
    { text: "先安撫他的情緒，再帶大家重新整理目前進度", role: "leader" },
    { text: "冷靜分析目前卡住的原因，找出最值得突破的地方", role: "brain" },
    { text: "給他一個簡單任務，例如幫忙找特定線索，讓他重新投入", role: "scout" },
    { text: "拍拍他說『還沒結束啦！』然後帶頭繼續往前推進", role: "tank" }
  ]
},
  {
    q: "如果可以為隊伍選一個能力加成，你希望是什麼？",
    opts: [
      { text: "全員更快看懂謎題背後的邏輯", role: "brain" },
      { text: "全員更容易發現隱藏線索與機關", role: "scout" },
      { text: "全員面對恐怖與未知時都能保持勇氣", role: "tank" },
      { text: "全員能即時共享資訊並維持最佳節奏", role: "leader" }
    ]
  }

const roles = {

  },

  diplomat: "你同時帶有外交官特質——當全隊卡關太久，你不會死撐，會適時出面溝通取得提示。",
  scout: "你同時帶有搜索手傾向——行動中你不忘廣撒注意力，常意外挖到隊友忽略的道具。",
  leader: "你同時帶有隊長傾向——即便不是主導者，你也會在混亂時不自覺地出來整合現況。",
  brain: "你同時帶有智囊傾向——解謎時你常有跳脫框架的靈感，是破僵局的關鍵助力。",
  tank: "你同時帶有坦克傾向——面對未知你比一般人更敢踏出第一步，為隊友建立安全感。"
};

let page = "intro", current = 0, answers = [];

function getScores() {
  const s = { leader:0, tank:0, brain:0, scout:0, diplomat:0 };
  answers.forEach(r => { if (s[r] !== undefined) s[r]++; });
  return s;
}

function getTopTwo() {
  const s = getScores();
  const sorted = Object.entries(s).sort((a,b) => b[1]-a[1]);
  return { primary: sorted[0][0], secondary: sorted[1][0] };
}

function renderIntro() {
  return `
    <div class="intro">
      <div class="intro-icon">🔐</div>
      <h1>你是哪種密室逃脫玩家？</h1>
      <p>15道情境題，找出你在密室中的核心角色定位，<br>幫助你與隊友組建最強陣容。</p>
      <div class="chips">
        <span class="chip" style="background:#ddeeff;color:#0C447C">🧭 隊長</span>
        <span class="chip" style="background:#fde8e0;color:#993C1D">🛡 坦克</span>
        <span class="chip" style="background:#e6f5d0;color:#3B6D11">🧠 智囊</span>
        <span class="chip" style="background:#fef0d0;color:#633806">🦅 鷹眼</span>
        <span class="chip" style="background:#eeedfe;color:#3C3489">📡 外交官</span>
      </div>
      <button class="btn primary" onclick="startQuiz()" style="padding:13px 44px;font-size:15px;border-radius:12px;">開始測驗 →</button>
    </div>`;
}

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  return `
    <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${pct}%"></div></div>
    <div class="q-meta">第 ${current+1} 題 ／ 共 ${questions.length} 題</div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map((o,i) => `<button class="opt-btn${answers[current]===o.role?' selected':''}" onclick="selectOpt('${o.role}',${i})" id="opt-${i}">${o.text}</button>`).join('')}
    </div>
    <div class="nav">
      <button class="btn" onclick="goBack()" ${current===0?'disabled':''}>← 上一題</button>
      <button class="btn primary" onclick="goNext()" ${answers[current]===undefined?'disabled':''} id="next-btn">${current===questions.length-1?'查看結果 →':'下一題 →'}</button>
    </div>`;
}

function renderResult() {
  const { primary, secondary } = getTopTwo();
  const role = roles[primary];
  const sec = roles[secondary];
  const scores = getScores();
  const total = questions.length;
  const bars = [
    {label:'隊長', key:'leader', color:'#378ADD'},
    {label:'坦克', key:'tank', color:'#D85A30'},
    {label:'智囊', key:'brain', color:'#639922'},
    {label:'鷹眼', key:'scout', color:'#BA7517'},
    {label:'外交官', key:'diplomat', color:'#7F77DD'}
  ];
  return `
    <span class="role-badge" style="background:${role.badge.bg};color:${role.badge.color}">${role.badge.text}</span>
    <div class="role-title">${role.name}</div>
    <div class="role-desc">${role.desc}</div>

    <div class="section-title">五種角色傾向分佈</div>
    <div class="bar-group">
      ${bars.map(b => `<div class="bar-row">
        <div class="bar-name">${b.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(scores[b.key]/total*100)}%;background:${b.color}"></div></div>
        <div class="bar-pct">${Math.round(scores[b.key]/total*100)}%</div>
      </div>`).join('')}
    </div>

    <div class="trait-grid">
      ${role.traits.map(t => `<div class="trait-card"><div class="trait-label">${t.label}</div><div class="trait-val">${t.val}</div></div>`).join('')}
    </div>

    <div class="section-title">次要角色特質</div>
    <div class="secondary-card">
      <div class="secondary-emoji">${sec.emoji}</div>
      <div>
        <div class="secondary-name">${sec.name}</div>
        <div class="secondary-desc">${secondaryDesc[secondary] || sec.desc}</div>
      </div>
    </div>

    <div class="tips-box">
      <div class="section-title">你的密室行動指南</div>
      ${role.tips.map(t => `<div class="tip-item">${t}</div>`).join('')}
    </div>

    <button class="restart-btn" onclick="restart()">↩ 重新測驗</button>`;
}

function render() {
  const app = document.getElementById('app');
  if (page === 'intro') app.innerHTML = renderIntro();
  else if (page === 'quiz') app.innerHTML = renderQuestion();
  else app.innerHTML = renderResult();
}

function startQuiz() { page = 'quiz'; current = 0; render(); }
function goBack() { if (current > 0) { current--; render(); } }
function goNext() {
  if (answers[current] === undefined) return;
  if (current === questions.length - 1) { page = 'result'; render(); }
  else { current++; render(); }
}
function selectOpt(role, idx) {
  answers[current] = role;
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('opt-' + idx).classList.add('selected');
  const nb = document.getElementById('next-btn');
  if (nb) nb.disabled = false;
}
function restart() { answers = []; current = 0; page = 'intro'; render(); }

render();
</script>
</body>
</html>
